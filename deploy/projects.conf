# Table de routage des déploiements.
# Format :  owner/repo = /chemin/du/clone/sur/le/vps
#
# - À gauche : le "full_name" du repo GitHub (tel qu'envoyé par le webhook).
# - À droite : le dossier où le repo est cloné sur le VPS (contient deploy.sh).
#
# Si un repo n'est pas listé ici, le dispatcher tente le fallback /srv/<repo>.
# Décommente/complète les lignes ci-dessous avec tes vrais owner/repo.

Labault/Humelis        = /srv/humelis
Labault/DevSpeak       = /srv/devspeak
Labault/red-flag-bingo = /srv/redflagbingo
Labault/hush           = /srv/hush
Labault/portfolio      = /srv/portfolio
Labault/LaOuLonVa      = /srv/laoulonva
