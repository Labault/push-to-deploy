# Nom de projet Compose FIGÉ (indépendant du dossier de checkout).
# Les volumes sont préfixés par le nom du projet : caddy_data = compte + certs
# Let's Encrypt. Sans ce pin, déployer depuis un dossier au nom différent
# (~/push-to-deploy vs ~/proxy-global) crée un volume VIDE et re-émet tous les
# certs (risque de rate-limit LE). On le fige sur le projet historique pour
# réutiliser le volume `proxy-global_caddy_data` existant.
name: proxy-global

services:
  caddy:
    image: caddy:2-alpine
    container_name: proxy_caddy
    restart: unless-stopped
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}   # ← AJOUT
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /srv/portfolio:/srv/portfolio:ro
    networks:
      - web

  # Listener de déploiement : reçoit les webhooks GitHub (via Caddy sur
  # deploy.labault.dev) et lance le deploy.sh du projet concerné.
  webhook:
    build: ./deploy/webhook
    container_name: proxy_webhook
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # pilote le démon Docker hôte
      - /srv:/srv                                   # accès aux clones des projets
      - ./deploy:/deploy                            # hooks.json, dispatch.sh, logs
      - ./deploy/keys:/keys:ro                      # clés de déploiement READ-ONLY (une par repo)
    networks:
      - web

networks:
  web:
    external: true
    name: web

volumes:
  caddy_data:
  caddy_config:
